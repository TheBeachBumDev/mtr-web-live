# Port bindings use ${MTR_PUBLISH_HOST:-127.0.0.1}. Compose reads that from the project .env file for
# interpolation (not from env_file .env.compose). Clone writes .env with MTR_PUBLISH_HOST=0.0.0.0 on standby.
services:
  core:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime_core
    container_name: mtr-core
    restart: unless-stopped
    env_file:
      - .env.compose
      - .env.compose.standby
    environment:
      APP_ROLE: core
      COMPOSE_PROJECT_NAME: mtr-web-live
      COMPOSE_FILE: /app/docker-compose.yml
    command: ["uvicorn", "main_core:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "${MTR_PUBLISH_HOST:-127.0.0.1}:9002:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/wibernetdev/.ssh:/home/wibernetdev/.ssh:ro
      # Match host wall clock for clone/DR log timestamps (Linux; Docker Desktop may differ).
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - postgres
      - redis
    networks:
      - mtr_net

